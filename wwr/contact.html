<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marlene Makouana">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Get in touch with White Water Rafting. Contact us for bookings, questions, or more information about our rafting adventures.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/hero-main.jpg" alt="Kayaker in river rapids">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact White Water Rafting</h1>

        <!-- Contact Info -->
        <section class="contact-info">
            <h2>Company Information</h2>
            <p><strong>Address:</strong> 123 River Road, Adventure City</p>
            <p><strong>Phone:</strong> +27 123 456 789</p>
            <p><strong>Email:</strong> info@wwr.com</p>

            <iframe src="https://www.google.com/maps/embed?pb=" loading="lazy"></iframe>
        </section>

        <!-- Employees -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="John - Guide">
                <figcaption>John – Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Sarah - Manager">
                <figcaption>Sarah – Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Mike - Instructor">
                <figcaption>Mike – Safety Instructor</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general">
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <div class="checkbox-group">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" cols="50"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 WWR Adventures | Marlene Makouana</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook.jpg" alt="Visit our Facebook page">
            </a>

            <a href="https://www.twitter.com">
                <img src="images/twitter.jpg" alt="Visit our Twitter page">
            </a>

            <a href="https://www.instagram.com">
                <img src="images/instagram.jpg" alt="Visit our Instagram page">
            </a>
        </nav>
    </footer>
</body>

</html>
